# ==========================================================
# SMPIT Asy-Syadzili — Unified Docker Compose
# ==========================================================
# All apps under one roof:
#   portal.localhost  → Portal (Next.js)
#   tu.localhost      → TU App (Next.js)
#   radig.localhost   → RADIG (PHP/Apache)
#
# Quick start:
#   1. Copy .env.example → .env  (adjust as needed)
#   2. docker compose up -d --build
#   3. docker compose exec portal npx prisma db push && npx prisma db seed
#   4. docker compose exec tu-app npx prisma db push && npx prisma db seed
#   5. Open http://portal.localhost
#
# Prerequisites (one-time):
#   Add to C:\Windows\System32\drivers\etc\hosts:
#     127.0.0.1 portal.localhost tu.localhost radig.localhost
# ==========================================================

services:
  # ---- PostgreSQL (shared for Portal & TU) ----
  postgres:
    image: postgres:16-alpine
    container_name: smpit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smpit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smpit_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pg.sh:/docker-entrypoint-initdb.d/init-pg.sh:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smpit}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smpit-net

  # ---- MySQL (RADIG only) ----
  mysql:
    image: mysql:8.0
    container_name: smpit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysql_root_2024}
      MYSQL_DATABASE: raporsmp
      MYSQL_USER: ${MYSQL_RADIG_USER:-radig}
      MYSQL_PASSWORD: ${MYSQL_RADIG_PASSWORD:-radig_secret_2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./radig/deepsync.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-mysql_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smpit-net

  # ---- Portal (Next.js, port 3000) ----
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: smpit-portal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-smpit}:${POSTGRES_PASSWORD:-smpit_secret_2024}@postgres:5432/portal_smpit?schema=public"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      NEXTAUTH_URL: ${PORTAL_URL:-http://portal.localhost}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_BASE_URL: ${PORTAL_URL:-http://portal.localhost}
      NEXT_PUBLIC_TU_URL: ${TU_URL:-http://tu.localhost}
      NEXT_PUBLIC_RADIG_URL: ${RADIG_URL:-http://radig.localhost}
      NEXT_PUBLIC_GURU_URL: ${GURU_URL:-http://guru.localhost}
      NEXT_PUBLIC_WALI_URL: ${WALI_URL:-http://wali.localhost}
      SSO_JWT_SECRET: ${SSO_JWT_SECRET:-smpit-sso-secret-2024-change-in-production}
    networks:
      - smpit-net

  # ---- TU App (Next.js, port 3000 internal) ----
  tu-app:
    build:
      context: ./tu-app
      dockerfile: Dockerfile
    container_name: smpit-tu
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-smpit}:${POSTGRES_PASSWORD:-smpit_secret_2024}@postgres:5432/tu_smpit?schema=public"
      RADIG_DATABASE_URL: "mysql://${MYSQL_RADIG_USER:-radig}:${MYSQL_RADIG_PASSWORD:-radig_secret_2024}@mysql:3306/raporsmp"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      NEXTAUTH_URL: ${TU_URL:-http://tu.localhost}
      AUTH_TRUST_HOST: "true"
      TU_DEFAULT_PASSWORD: ${TU_DEFAULT_PASSWORD:-Asysyadzili2025!}
      SSO_JWT_SECRET: ${SSO_JWT_SECRET:-smpit-sso-secret-2024-change-in-production}
      NEXT_PUBLIC_PORTAL_URL: ${PORTAL_URL:-http://portal.localhost}
    networks:
      - smpit-net

  # ---- RADIG (PHP/Apache, port 80 internal) ----
  radig:
    build:
      context: ./radig
      dockerfile: Dockerfile
    container_name: smpit-radig
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: ${MYSQL_RADIG_USER:-radig}
      DB_PASS: ${MYSQL_RADIG_PASSWORD:-radig_secret_2024}
      DB_NAME: raporsmp
      SSO_JWT_SECRET: ${SSO_JWT_SECRET:-smpit-sso-secret-2024-change-in-production}
    networks:
      - smpit-net

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: smpit-nginx
    restart: unless-stopped
    depends_on:
      - portal
      - tu-app
      - radig
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - smpit-net

  # ---- Sync Service (DEPRECATED — identity is centralized in Portal) ----
  # With auto-provision in sso_login.php and TU SSO route, sync is no longer needed.
  # Uncomment only if you need to run a one-time data migration.
  # sync-service:
  #   build:
  #     context: ./sync-service
  #   container_name: smpit-sync
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     mysql:
  #       condition: service_healthy
  #   environment:
  #     MYSQL_HOST: mysql
  #     MYSQL_USER: ${MYSQL_RADIG_USER:-radig}
  #     MYSQL_PASSWORD: ${MYSQL_RADIG_PASSWORD:-radig_secret_2024}
  #     MYSQL_DATABASE: raporsmp
  #     PORTAL_DB_URL: "postgresql://${POSTGRES_USER:-smpit}:${POSTGRES_PASSWORD:-smpit_secret_2024}@postgres:5432/portal_smpit"
  #     TU_DB_URL: "postgresql://${POSTGRES_USER:-smpit}:${POSTGRES_PASSWORD:-smpit_secret_2024}@postgres:5432/tu_smpit"
  #     SYNC_INTERVAL_MINUTES: "10"
  #     DEFAULT_PASSWORD_HASH: "$$2b$$12$$yHDmrGrZRzDVZgqQtU8PR.gYoyjs5j3s25Z7HQ1crvs6tWdYUFeOC"
  #   networks:
  #     - smpit-net

volumes:
  postgres_data:
  mysql_data:

networks:
  smpit-net:
    driver: bridge
