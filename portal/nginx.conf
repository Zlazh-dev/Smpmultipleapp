# ==========================================================
# Portal SMPIT Asy-Syadzili — Nginx Configuration
# Wildcard *.sekolahasy.com reverse proxy / classifier
# ==========================================================
# Routing:
#   portal.sekolahasy.com → portal:3000 (Next.js)
#   tu.sekolahasy.com     → localhost:3001 (external TU container — future)
#   radig.sekolahasy.com  → localhost:3002 (external RADIG container — future)
#   guru.sekolahasy.com   → portal:3000 (internal rewrite via middleware)
#   wali.sekolahasy.com   → portal:3000 (internal rewrite via middleware)
#
# DNS: A *.sekolahasy.com → your-server-ip
# ==========================================================

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'host=$host';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml image/svg+xml;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Upstreams
    upstream portal_app {
        server portal:3000;
        keepalive 32;
    }

    # ================================
    # portal.sekolahasy.com — Main Portal
    # ================================
    server {
        listen 80;
        server_name portal.sekolahasy.com sekolahasy.com localhost;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /api/auth {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://portal_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /_next/static {
            proxy_pass http://portal_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /sw.js {
            proxy_pass http://portal_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location / {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://portal_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ================================
    # tu.sekolahasy.com → External TU App (port 3001)
    # Currently: proxy to portal (internal placeholder)
    # Future: uncomment proxy_pass to tu_app upstream
    # ================================
    server {
        listen 80;
        server_name tu.sekolahasy.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            # === CURRENT: Forward to portal for placeholder ===
            proxy_pass http://portal_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-App "tu";
            proxy_set_header X-Original-Host $host;

            # === FUTURE: Uncomment when TU container is running ===
            # proxy_pass http://host.docker.internal:3001;
        }
    }

    # ================================
    # radig.sekolahasy.com → External RADIG App (port 3002)
    # Currently: proxy to portal (internal placeholder)
    # Future: uncomment proxy_pass to radig_app upstream
    # ================================
    server {
        listen 80;
        server_name radig.sekolahasy.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            # === CURRENT: Forward to portal for placeholder ===
            proxy_pass http://portal_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-App "radig";
            proxy_set_header X-Original-Host $host;

            # === FUTURE: Uncomment when RADIG container is running ===
            # proxy_pass http://host.docker.internal:3002;
        }
    }

    # ================================
    # guru.sekolahasy.com → Internal (portal handles via middleware)
    # ================================
    server {
        listen 80;
        server_name guru.sekolahasy.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            proxy_pass http://portal_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-App "guru";
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ================================
    # wali.sekolahasy.com → Internal (portal handles via middleware)
    # ================================
    server {
        listen 80;
        server_name wali.sekolahasy.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            proxy_pass http://portal_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-App "wali";
            proxy_cache_bypass $http_upgrade;
        }
    }
}
