# ================================================
# Portal SMPIT Asy-Syadzili — Docker Compose
# ================================================
# Usage:
#   cp .env.prod.example .env.prod
#   docker-compose --env-file .env.prod up -d
#   docker-compose exec portal npx prisma db push
#   docker-compose exec portal npx prisma db seed
#   Access: http://portal.sekolahasy.com (via nginx)
# ================================================

services:
  # ---- PostgreSQL (Portal DB) ----
  postgres-portal:
    image: postgres:16-alpine
    container_name: smpit-postgres-portal
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal_secure_password_2024}
      POSTGRES_DB: ${POSTGRES_DB:-portal_smpit}
    volumes:
      - postgres_portal_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smpit-network

  # ---- Next.js Portal (port 3000) ----
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smpit-portal
    restart: unless-stopped
    depends_on:
      postgres-portal:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-portal_user}:${POSTGRES_PASSWORD:-portal_secure_password_2024}@postgres-portal:5432/${POSTGRES_DB:-portal_smpit}?schema=public"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://portal.sekolahasy.com}
      NEXT_PUBLIC_TU_URL: ${NEXT_PUBLIC_TU_URL:-http://tu.sekolahasy.com}
      NEXT_PUBLIC_RADIG_URL: ${NEXT_PUBLIC_RADIG_URL:-http://radig.sekolahasy.com}
      NEXT_PUBLIC_GURU_URL: ${NEXT_PUBLIC_GURU_URL:-http://guru.sekolahasy.com}
      NEXT_PUBLIC_WALI_URL: ${NEXT_PUBLIC_WALI_URL:-http://wali.sekolahasy.com}
    ports:
      - "3000:3000"
    networks:
      - smpit-network

  # ---- Nginx Reverse Proxy ----
  # Wildcard *.sekolahasy.com classifier
  # tu → port 3001 (external), radig → port 3002 (external)
  # guru/wali → portal:3000 (internal rewrite)
  nginx:
    image: nginx:alpine
    container_name: smpit-nginx
    restart: unless-stopped
    depends_on:
      - portal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount external app folders (ready for future containers)
      - ${TU_PATH:-./docker/mount-placeholder}:/mnt/tu:ro
      - ${RADIG_PATH:-./docker/mount-placeholder}:/mnt/radig:ro
    networks:
      - smpit-network

volumes:
  postgres_portal_data:
    driver: local

networks:
  smpit-network:
    driver: bridge
