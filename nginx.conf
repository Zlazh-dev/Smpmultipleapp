# ==========================================================
# Nginx — Subdomain-based Reverse Proxy
# ==========================================================
# portal.localhost → portal:3000
# tu.localhost     → tu-app:3000
# radig.localhost  → radig:80
# ==========================================================

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status '
                    '$body_bytes_sent host=$host';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstreams ──
    upstream portal_upstream {
        server portal:3000;
        keepalive 16;
    }
    upstream tu_upstream {
        server tu-app:3000;
        keepalive 16;
    }
    upstream radig_upstream {
        server radig:80;
        keepalive 16;
    }

    # ================================
    # portal.localhost / portal.sekolahasy.com
    # ================================
    server {
        listen 80;
        server_name portal.localhost portal.sekolahasy.com sekolahasy.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Auth endpoints — rate limited
        location /api/auth {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://portal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets — long cache
        location /_next/static {
            proxy_pass http://portal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Everything else
        location / {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://portal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ================================
    # tu.localhost / tu.sekolahasy.com
    # ================================
    server {
        listen 80;
        server_name tu.localhost tu.sekolahasy.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /_next/static {
            proxy_pass http://tu_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://tu_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ================================
    # radig.localhost / radig.sekolahasy.com
    # ================================
    server {
        listen 80;
        server_name radig.localhost radig.sekolahasy.com;

        add_header X-Content-Type-Options "nosniff" always;

        # PHP uploads need larger body
        client_max_body_size 100M;

        # Static assets from PHP app
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://radig_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400";
        }

        location / {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://radig_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
    }

    # ================================
    # Catch-all — redirect to portal
    # ================================
    server {
        listen 80 default_server;
        server_name _;
        return 301 http://portal.localhost$request_uri;
    }
}
